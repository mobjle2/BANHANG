<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Inter',sans-serif;
}

body{
    background:#f4f7fb;
    color:#111827;
}

.app{
    display:flex;
    min-height:100vh;
}

/* ====== SIDEBAR ====== */

.sidebar{
    width:220px;
    background:#0f172a;
    color:white;
    position:fixed;
    top:0;
    left:0;
    bottom:0;
    padding:18px 0;
    z-index:100;
    transition:left .25s ease;
}

.logo{
    padding:0 18px 18px;
    font-size:22px;
    font-weight:800;
}

.menu button{
    width:calc(100% - 12px);
    margin-left:6px;
    border:none;
    background:none;
    color:white;
    text-align:left;
    padding:12px 14px;
    border-radius:8px;
    cursor:pointer;
    font-size:12px;
}

.menu button.active,
.menu button:hover{
    background:#13203a;
}

/* ====== MAIN ====== */

.main{
    flex:1;
    margin-left:220px;
}

.header{
    background:white;
    border-bottom:1px solid #e2e8f0;
    padding:14px 16px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
}

.header-left{
    display:flex;
    align-items:center;
    gap:12px;
}

.page-title{
    font-size:18px;
    font-weight:800;
}

.search{
    width:280px;
    border:1px solid #dbe2ea;
    padding:10px 14px;
    border-radius:8px;
    outline:none;
    font-size:12px;
}

.content{
    padding:14px;
}

.cards{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:14px;
}

.card{
    background:white;
    padding:18px;
    border-radius:12px;
}

.card-title{
    color:#64748b;
    font-size:12px;
}

.card-value{
    font-size:28px;
    font-weight:800;
    margin-top:10px;
}
    
/* ====== BẢNG ====== */

.table-wrap{
    background:white;
    border:1px solid #e2e8f0;
    overflow:auto;
    margin-top:14px;
}

table{
    width:100%;
    border-collapse:collapse;
    table-layout:fixed;
}

th{
    background:#f8fafc;
    border-bottom:1px solid #e2e8f0;
    padding:10px;
    text-align:left;
    font-size:12px;
    white-space:nowrap;
}

td{
    border-bottom:1px solid #edf2f7;
    padding:8px 10px;
    font-size:12px;
}

/* ====== NHẬP HÀNG ====== */

#nhapTable td{
    padding:0 !important;
}

#nhapTable tr{
    height:44px;
}

#nhapTable input{
    width:100%;
    height:44px;
    border:none;
    border-right:1px solid #e2e8f0;
    outline:none;
    padding:0 10px;
    font-size:12px;
}

/* ====== NÚT ====== */

.btn{
    border:none;
    border-radius:8px;
    padding:9px 12px;
    font-size:12px;
    font-weight:700;
    cursor:pointer;
}

.btn-blue{
    background:#2563eb;
    color:white;
}

.btn-green{
    background:#16a34a;
    color:white;
}

.btn-red{
    background:#dc2626;
    color:white;
}

.topbar{
    display:flex;
    justify-content:flex-end;
    gap:10px;
    margin-bottom:14px;
}

/* ====== TỔNG TIỀN ====== */

.total-box{
    background:white;
    border:1px solid #e2e8f0;
    margin-top:14px;
    padding:18px;
}

.total-big{
    font-size:28px;
    font-weight:800;
    color:#2563eb;
    margin:10px 0;
}

.save-btn{
    width:100%;
}

/* ====== MODAL ====== */

.modal{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.4);
    display:none;
    align-items:center;
    justify-content:center;
    z-index:500;
}

.modal-box{
    width:100%;
    max-width:420px;
    background:white;
    padding:20px;
    border-radius:12px;
}

.modal-header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:16px;
}

.close-btn{
    width:34px;
    height:34px;
    border:none;
    border-radius:8px;
    background:#ef4444;
    color:white;
    cursor:pointer;
}

.form-group{
    margin-bottom:12px;
}

.form-group input{
    width:100%;
    border:1px solid #dbe2ea;
    padding:11px 12px;
    border-radius:8px;
    outline:none;
    font-size:12px;
}

.full-btn{
    width:100%;
}

/* ====== MOBILE ====== */

.mobile-toggle{
    display:none;
}

@media(max-width:900px){

/* ====== THANH BÊN MOBILE ====== */

.sidebar{

    left:-220px;

    width:220px;

}

.sidebar.show{

    left:0;

}

.main{

    margin-left:0;

    width:100%;

}

/* ====== ĐẦU TRANG MOBILE ====== */

.header{

    padding:10px;

    flex-direction:column;

    align-items:stretch;

    gap:10px;

}

.header-left{

    width:100%;

    justify-content:space-between;

}

.page-title{

    font-size:16px;

}

.search{

    width:100%;

}

/* ====== NỘI DUNG MOBILE ====== */

.content{

    padding:10px;

}

/* ====== NÚT MOBILE ====== */

.btn{

    padding:8px 10px;

    font-size:11px;

}

/* ====== THANH TRÊN MOBILE ====== */

.topbar{

    flex-wrap:wrap;

    justify-content:flex-start;

}

/* ====== THẺ MOBILE ====== */

.cards{

    grid-template-columns:1fr;

}

.card{

    padding:14px;

}

.card-value{

    font-size:22px;

}

/* ====== BẢNG MOBILE ====== */

.table-wrap{

    overflow-x:auto;

}

table{

    min-width:900px;

}

/* ====== BẢNG MOBILE ====== */

#nhapTable input{

    min-width:70px;

    font-size:11px;

}

/* ====== MODAL MOBILE ====== */

.modal-box{

    width:calc(100% - 20px);

    max-width:none;

    padding:16px;

}

/* ====== NÚT MENU MOBILE ====== */

.mobile-toggle{

    display:block;

    border:none;

    background:#2563eb;

    color:white;

    padding:8px 12px;

    border-radius:8px;

}

}
    
/* ====== ẨN ====== */
    
.hidden{
    display:none;
}

</style>

</head>

<body>

<div class="app">

    <!-- SIDEBAR -->

    <aside class="sidebar"
    id="sidebar">

        <div class="logo">

            POS PRO

        </div>

        <div class="menu">

            <button id="btnDashboard">
                Dashboard
            </button>

            <button
            id="btnProducts"
            class="active">

                Sản phẩm

            </button>

            <button id="btnNhap">
                Nhập hàng
            </button>
        <button id="btnHistory">
    Lịch sử nhập
</button>
        </div>

    </aside>

    <!-- MAIN -->

    <main class="main">

        <div class="header">

            <div class="header-left">

                <button
                class="mobile-toggle"
                onclick="toggleSidebar()">

                    ☰

                </button>

                <div class="page-title"
                id="pageTitle">

                    Sản phẩm

                </div>

            </div>

            <input
            type="text"
            class="search"
            id="searchInput"
            placeholder="Tìm sản phẩm..."
            oninput="renderProducts()">

        </div>

        <div class="content">
            <!-- DASHBOARD -->

            <div id="dashboardPage"
            class="hidden">

                <div class="cards">

                    <div class="card">

                        <div class="card-title">
                            Tổng sản phẩm
                        </div>

                        <div class="card-value"
                        id="totalProducts">
                            0
                        </div>

                    </div>

                    <div class="card">

                        <div class="card-title">
                            Tổng tồn kho
                        </div>

                        <div class="card-value"
                        id="totalStock">
                            0
                        </div>

                    </div>

                    <div class="card">

                        <div class="card-title">
                            Tổng giá trị
                        </div>

                        <div class="card-value"
                        id="totalValue">
                            0đ
                        </div>

                    </div>

                </div>

            </div>

            <!-- PRODUCTS -->

            <div id="productsPage">

                <div class="topbar">

                    <button
                    class="btn btn-green"
                    onclick="excelFile.click()">

                        Import Excel

                    </button>

                    <button
                    class="btn btn-blue"
                    onclick="exportExcel()">

                        Xuất Excel

                    </button>

                    <button
                    class="btn btn-blue"
                    onclick="openModal()">

                        Thêm sản phẩm

                    </button>

                    <input
                    type="file"
                    id="excelFile"
                    hidden
                    accept=".xlsx,.xls">

                </div>

                <div class="table-wrap">

                    <table>

                        <thead>

                            <tr>

                                <th>Mã</th>
                                <th>Tên</th>
                                <th>Giá nhập</th>
                                <th>Giá bán</th>
                                <th>Giá sỉ</th>
                                <th>Tồn</th>
                                <th>Thao tác</th>

                            </tr>

                        </thead>

                        <tbody id="productTable">

                        </tbody>

                    </table>

                </div>

            </div>

            <!-- NHẬP HÀNG -->

            <div id="nhapPage"
            class="hidden">

                <div class="topbar">

                    <button
                    class="btn btn-blue"
                    onclick="addNhapRow()">

                        + Thêm hàng

                    </button>

                </div>
                <!-- LỊCH SỬ NHẬP -->


                <div class="table-wrap">

                    <table>

                        <thead>

                            <tr>

                                <th>Mã</th>

                                <th>Tên sản phẩm</th>

                                <th>SL</th>

                                <th>Giá nhập</th>

                                <th>Giá bán</th>

                                <th>Thành tiền</th>

                                <th>Xóa</th>

                            </tr>

                        </thead>

                        <tbody id="nhapTable">

                        </tbody>

                    </table>

                </div>

                <div class="total-box">

                    <div>Tổng tiền</div>

                    <div class="total-big"
                    id="tongTien">

                        0đ

                    </div>

                    <button
                    class="btn btn-blue save-btn"
                    onclick="saveNhap()">

                        Lưu phiếu nhập

                    </button>

                </div>

            </div>

            <!-- LỊCH SỬ NHẬP -->

            <div id="historyPage"
            class="hidden">

                <div class="table-wrap">

                    <table>

                        <thead>

                            <tr>
                                <th>Mã phiếu</th>
                                <th>Thời gian</th>
                                

                                <th>Tổng tiền</th>

                                <th>Số SP</th>

                            </tr>

                        </thead>

                        <tbody id="historyTable">

                        </tbody>

                    </table>

                </div>

            </div>

        </div>

    </main>

</div>
<!-- MODAL -->

<div class="modal"
id="modal">

    <div class="modal-box">

        <div class="modal-header">

            <h2 id="modalTitle">

                Sản phẩm

            </h2>

            <button
            class="close-btn"
            onclick="closeModal()">

                ✕

            </button>

        </div>

        <div class="form-group">

            <input
            type="text"
            id="ma"
            placeholder="Mã hàng">

        </div>

        <div class="form-group">

            <input
            type="text"
            id="ten"
            placeholder="Tên hàng">

        </div>

        <div class="form-group">

            <input
            type="number"
            id="giaNhap"
            placeholder="Giá nhập">

        </div>

        <div class="form-group">

            <input
            type="number"
            id="giaBan"
            placeholder="Giá bán">

        </div>

        <div class="form-group">

            <input
            type="number"
            id="giaSi"
            placeholder="Giá sỉ">

        </div>

        <div class="form-group">

            <input
            type="number"
            id="ton"
            placeholder="Tồn kho">

        </div>

        <button
        class="btn btn-blue full-btn"
        onclick="saveProduct()">

            Lưu sản phẩm

        </button>

    </div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
    getDatabase,
    ref,
    push,
    onValue,
    remove,
    update
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

/* ====== FIREBASE ====== */

const firebaseConfig = {

    apiKey:
    "AIzaSyBdUaWQRCplxX5bG64gBYqLNPGFoRN5DoE",

    authDomain:
    "quanlybanhangtn.firebaseapp.com",

    databaseURL:
    "https://quanlybanhangtn-default-rtdb.asia-southeast1.firebasedatabase.app/",

    projectId:
    "quanlybanhangtn",

    storageBucket:
    "quanlybanhangtn.firebasestorage.app",

    messagingSenderId:
    "627580656858",

    appId:
    "1:627580656858:web:e1cbc69055b78afb0cd9e3"

}

const app =
initializeApp(firebaseConfig)

const db =
getDatabase(app)

const productsRef =
ref(db,"products")
const importOrdersRef =
ref(db,"import_orders")
let importOrders = []
    
/* ====== DATA ====== */

let products = []

let nhapRows = []

let editId = null
    
/* ====== REALTIME ====== */

onValue(productsRef,(snapshot)=>{

    products = []

    snapshot.forEach(child=>{

        products.push({

            id:child.key,

            ...child.val()

        })

    })

    renderProducts()

    renderDashboard()

})

/* ====== REALTIME PHIẾU NHẬP ====== */

onValue(importOrdersRef,(snapshot)=>{

    importOrders = []

    snapshot.forEach(child=>{

        importOrders.push({

            id:child.key,

            ...child.val()

        })

    })

    if(historyTable){

        renderHistory()

    }

})
    
/* ====== MENU MOBILE ====== */

window.toggleSidebar = function(){

    sidebar.classList.toggle("show")

}

/* ====== CHUYỂN TRANG ====== */

window.showPage = function(page){
    

    dashboardPage.classList.add("hidden")

    productsPage.classList.add("hidden")

    nhapPage.classList.add("hidden")
    historyPage.classList.add("hidden")

    document
    .querySelectorAll(".menu button")
    .forEach(btn=>{

        btn.classList.remove("active")

    })

 /* ====== BẢNG ĐIỀU KHIỂN ====== */

    if(page === "dashboard"){

        dashboardPage.classList.remove("hidden")

        btnDashboard.classList.add("active")

        pageTitle.innerText =
        "Dashboard"

        searchInput.style.display =
        "none"

    }

 /* ====== SẢN PHẨM ====== */

    else if(page === "products"){

        productsPage.classList.remove("hidden")

        btnProducts.classList.add("active")

        pageTitle.innerText =
        "Sản phẩm"

        searchInput.style.display =
        "block"

    }

/* ====== NHẬP HÀNG ====== */

else if(page === "nhap"){

    nhapPage.classList.remove("hidden")

    btnNhap.classList.add("active")

    pageTitle.innerText =
    "Nhập hàng"

    searchInput.style.display =
    "none"

    if(nhapRows.length === 0){

        addNhapRow()

    }

    renderNhap()

}

/* ====== LỊCH SỬ ====== */

else if(page === "history"){

    historyPage.classList.remove("hidden")

    btnHistory.classList.add("active")

    pageTitle.innerText =
    "Lịch sử nhập"

    searchInput.style.display =
    "none"

    renderHistory()

}

 /* ====== TỰ ĐÓNG MOBILE ====== */

    if(window.innerWidth <= 900){

        sidebar.classList.remove("show")

    }

}

/* ====== DASHBOARD ====== */

window.renderDashboard = function(){

    totalProducts.innerText =
    products.length

    let stock = 0

    let value = 0

    products.forEach(p=>{

        stock += Number(p.ton)

        value +=
        Number(p.ton) *
        Number(p.gia_nhap)

    })

    totalStock.innerText =
    stock.toLocaleString()

    totalValue.innerText =
    value.toLocaleString() + "đ"

}

/* ====== HIỂN THỊ SẢN PHẨM ====== */
    
window.renderProducts = function(){

    const keyword =
    (searchInput.value || "")
    .toLowerCase()
    .trim()

    let html = ""

    products.forEach((p,index)=>{

        const ten =
        (p.ten || "")
        .toLowerCase()

        const ma =
        (p.ma || "")
        .toLowerCase()

        const words =
        keyword
        .split(" ")
        .filter(Boolean)   

        const match =
        words.every(w=>

            ten.includes(w)
            ||
            ma.includes(w)

        )

        if(match){

            html += `
            <tr>

                <td>
                    ${p.ma || ""}
                </td>

                <td>
                    ${p.ten || ""}
                </td>

                <td>
                    ${(Number(p.gia_nhap)||0)
                    .toLocaleString()}đ
                </td>

                <td style="
                color:#2563eb;
                font-weight:700;
                ">
                    ${(Number(p.gia_ban)||0)
                    .toLocaleString()}đ
                </td>

                <td>
                    ${(Number(p.gia_si)||0)
                    .toLocaleString()}đ
                </td>

                <td>

                    <div style="
                    background:#eff6ff;
                    color:#2563eb;
                    padding:6px 10px;
                    border-radius:6px;
                    text-align:center;
                    font-weight:700;
                    ">

                        ${p.ton || 0}

                    </div>

                </td>

                <td>

                    <div style="
                    display:flex;
                    gap:6px;
                    ">

                        <button
                        class="btn btn-blue"
                        onclick="editProduct(${index})">

                            Sửa

                        </button>

                        <button
                        class="btn btn-red"
                        onclick="deleteProduct(${index})">

                            Xóa

                        </button>

                    </div>

                </td>

            </tr>
            `

        }

    })

    productTable.innerHTML = html

}

/* ====== XUẤT EXCEL ====== */

window.exportExcel = function(){

    const data =
    products.map(p=>({

        "Mã hàng":p.ma,

        "Tên hàng":p.ten,

        "Giá nhập":p.gia_nhap,

        "Giá bán":p.gia_ban,

        "Giá sỉ":p.gia_si,

        "Tồn kho":p.ton

    }))

    const worksheet =
    XLSX.utils.json_to_sheet(data)

    const workbook =
    XLSX.utils.book_new()

    XLSX.utils.book_append_sheet(

        workbook,
        worksheet,
        "SanPham"

    )

    XLSX.writeFile(

        workbook,
        "POS_PRO.xlsx"

    )

}
    
/* ====== MỞ MODAL ====== */

window.openModal = function(){

    editId = null

    modalTitle.innerText =
    "Thêm sản phẩm"

    ma.value = ""
    ten.value = ""
    giaNhap.value = ""
    giaBan.value = ""
    giaSi.value = ""
    ton.value = ""

    modal.style.display =
    "flex"

}

/* ====== ĐÓNG MODAL ====== */

window.closeModal = function(){

    modal.style.display =
    "none"

}

/* ====== SỬA SẢN PHẨM ====== */

window.editProduct = function(index){

    const p = products[index]

    editId = p.id

    ma.value = p.ma

    ten.value = p.ten

    giaNhap.value = p.gia_nhap

    giaBan.value = p.gia_ban

    giaSi.value = p.gia_si

    ton.value = p.ton

    modalTitle.innerText =
    "Sửa sản phẩm"

    modal.style.display =
    "flex"

}

/* ====== LƯU SẢN PHẨM ====== */

window.saveProduct = function(){

    if(!ma.value || !ten.value){

        alert("Nhập mã và tên")

        return

    }

    const data = {

        ma:ma.value,

        ten:ten.value,

        gia_nhap:Number(giaNhap.value),

        gia_ban:Number(giaBan.value),

        gia_si:Number(giaSi.value),

        ton:Number(ton.value)

    }

    /* SỬA */

    if(editId){

        update(

            ref(
                db,
                "products/" + editId
            ),

            data

        )

    }

    /* THÊM */

    else{

        push(
            productsRef,
            data
        )

    }

    closeModal()

}

/* ====== XÓA SẢN PHẨM ====== */

window.deleteProduct = function(index){

    if(confirm("Xóa sản phẩm?")){

        remove(

            ref(
                db,
                "products/" + products[index].id
            )

        )

    }

}

/* ====== IMPORT EXCEL ====== */

excelFile.addEventListener(
"change",
e=>{

    const file =
    e.target.files[0]

    if(!file) return

    const reader =
    new FileReader()

    reader.onload = evt=>{

        const data =
        new Uint8Array(
            evt.target.result
        )

        const workbook =
        XLSX.read(
            data,
            {type:"array"}
        )

        const sheet =
        workbook.Sheets[
            workbook.SheetNames[0]
        ]

        const json =
        XLSX.utils.sheet_to_json(sheet)

        json.forEach(row=>{

            /* ====== KIỂM TRA TRÙNG MÃ ====== */

            const exists =
            products.find(
                p=>p.ma===row["Mã hàng"]
            )

            if(exists) return

            /* ====== THÊM SẢN PHẨM ====== */

            push(productsRef,{

                ma:
                row["Mã hàng"] || "",

                ten:
                row["Tên hàng"] || "",

                gia_nhap:Number(
                    row["Giá nhập"] || 0
                ),

                gia_ban:Number(
                    row["Giá bán"] || 0
                ),

                gia_si:Number(
                    row["Giá sỉ"] || 0
                ),

                ton:Number(
                    row["Tồn kho"] || 0
                )

            })

        })

        alert("Import thành công")

    }

    reader.readAsArrayBuffer(file)

})
/* ====== THÊM DÒNG NHẬP ====== */

window.addNhapRow = function(){

    nhapRows.push({

        ma:"",
        ten:"",
        sl:1,
        gia:0,
        giaBan:0

    })

    renderNhap()

}
    
/* ====== RENDER NHẬP HÀNG ====== */

window.renderNhap = function(){

    let html = ""

    let tong = 0

    nhapRows.forEach((r,index)=>{

        const found =
        products.find(
            p=>p.ma===r.ma
        )

        const tenSP =
        found
        ? found.ten
        : (r.ten || "")

        tong += r.sl * r.gia

        html += `
        <tr>

            <!-- MÃ -->

            <td style="
            width:140px;
            min-width:140px;
            ">

                <input
                type="text"
                value="${r.ma}"
                onchange="changeMa(${index},this.value)"
                placeholder="Mã hàng">

            </td>

            <!-- TÊN -->

            <td style="
            min-width:260px;
            ">

                <input
                type="text"
                value="${tenSP}"
                onchange="changeTen(${index},this.value)"
                placeholder="Tên sản phẩm">

            </td>

            <!-- SL -->

            <td style="
            width:70px;
            min-width:70px;
            ">

                <input
                type="number"
                value="${r.sl}"
                onchange="changeSl(${index},this.value)"
                style="
                text-align:center;
                ">

            </td>

            <!-- GIÁ NHẬP -->

            <td style="
            width:120px;
            min-width:120px;
            ">

                <input
                type="number"
                value="${r.gia}"
                onchange="changeGia(${index},this.value)">

            </td>

            <!-- GIÁ BÁN -->

            <td style="
            width:120px;
            min-width:120px;
            ">

                <input
                type="number"
                value="${r.giaBan || 0}"
                onchange="changeGiaBan(${index},this.value)">

            </td>

            <!-- THÀNH TIỀN -->

            <td style="
            width:140px;
            min-width:140px;
            ">

                <div style="
                height:44px;
                display:flex;
                align-items:center;
                justify-content:center;
                background:#f8fafc;
                color:#2563eb;
                font-weight:700;
                border-right:1px solid #e2e8f0;
                ">

                    ${(r.sl*r.gia).toLocaleString()}đ

                </div>

            </td>

            <!-- XÓA -->

            <td style="
            width:70px;
            min-width:70px;
            ">

                <button
                class="btn btn-red"
                onclick="removeNhap(${index})"
                style="
                width:100%;
                height:44px;
                border-radius:0;
                ">

                    Xóa

                </button>

            </td>

        </tr>
        `

    })

    nhapTable.innerHTML = html

    tongTien.innerText =
    tong.toLocaleString() + "đ"

}

/* ====== ĐỔI MÃ ====== */

window.changeMa = function(index,val){

    nhapRows[index].ma = val

    const found =
    products.find(
        p=>p.ma===val
    )

    if(found){

        nhapRows[index].ten =
        found.ten

        nhapRows[index].gia =
        found.gia_nhap

        nhapRows[index].giaBan =
        found.gia_ban

    }

    renderNhap()

}

/* ====== ĐỔI TÊN ====== */

window.changeTen = function(index,val){

    nhapRows[index].ten = val

}

/* ====== ĐỔI SL ====== */

window.changeSl = function(index,val){

    nhapRows[index].sl =
    Number(val)

    renderNhap()

}

/* ====== ĐỔI GIÁ NHẬP ====== */

window.changeGia = function(index,val){

    nhapRows[index].gia =
    Number(val)

    renderNhap()

}

/* ====== ĐỔI GIÁ BÁN ====== */

window.changeGiaBan = function(index,val){

    nhapRows[index].giaBan =
    Number(val)

    renderNhap()

}
    
/* ====== XÓA DÒNG ====== */

window.removeNhap = function(index){

    nhapRows.splice(index,1)

    renderNhap()

}

/* ====== LƯU NHẬP HÀNG ====== */

window.saveNhap = async function(){

    if(nhapRows.length === 0){

        alert("Chưa có sản phẩm")

        return

    }

    let tong = 0

    const items = []

    nhapRows.forEach(r=>{

        tong +=
        Number(r.sl) *
        Number(r.gia)

        items.push({

            ma:r.ma,

            ten:r.ten,

            sl:Number(r.sl),

            gia:Number(r.gia),

            giaBan:Number(r.giaBan),

            thanhTien:
            Number(r.sl) *
            Number(r.gia)

        })

    })

    /* LƯU PHIẾU */

   await push(

    importOrdersRef,

    {

        maPhieu:
        "PN" + Date.now(),

        time:
            new Date()

            tong:tong,

            items:items

        }

    )

    /* CỘNG TỒN */

    nhapRows.forEach(r=>{

        const found =
        products.find(
            p=>p.ma===r.ma
        )

       if(found){

    update(

        ref(
            db,
            "products/" + found.id
        ),

        {

            ton:
            Number(found.ton) +
            Number(r.sl),

            gia_nhap:
            Number(r.gia),

            gia_ban:
            Number(r.giaBan),

            gia_si:
            Number(r.giaBan)

        }

    )

}

/* ====== TẠO SẢN PHẨM MỚI ====== */

else{

    push(productsRef,{

        ma:r.ma,

        ten:r.ten,

        gia_nhap:Number(r.gia),

        gia_ban:Number(r.giaBan),

        gia_si:Number(r.giaBan),

        ton:Number(r.sl)

    })

}
    })

    nhapRows = []

    renderNhap()

    alert("Đã lưu phiếu nhập")

}
