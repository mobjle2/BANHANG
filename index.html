<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>POS PRO CLOUD</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Inter',sans-serif;
}

body{
    background:#f4f7fb;
    color:#111827;
}

.app{
    display:flex;
    min-height:100vh;
}

/* =====================================================
SIDEBAR
===================================================== */

.sidebar{
    width:230px;
    background:linear-gradient(to bottom,#0f172a,#111827);
    color:white;
    position:fixed;
    top:0;
    left:0;
    bottom:0;
    z-index:100;
    padding:24px 0;
    transition:left .25s ease;
}

.logo{
    padding:0 28px 30px;
    font-size:28px;
    font-weight:800;
}

.menu button{
    width:100%;
    border:none;
    background:transparent;
    color:white;
    text-align:left;
    padding:16px 22px;
    font-size:14px;
    cursor:pointer;
    border-radius:14px;
    margin:4px 10px;
    width:calc(100% - 20px);
}

.menu button:hover,
.menu button.active{
    background:#13203a;
}

/* =====================================================
MAIN
===================================================== */

.main{
    flex:1;
    margin-left:260px;
}

.header{
    min-height:80px;
    background:white;
    border-bottom:1px solid #e5e7eb;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:16px 24px;
    gap:14px;
    position:sticky;
    top:0;
    z-index:50;
}

.page-title{
    font-size:24px;
    font-weight:800;
}

.search{
    width:320px;
    max-width:100%;
    padding:14px 18px;
    border-radius:16px;
    border:1px solid #dbe2ea;
    background:#f9fafb;
    outline:none;
    font-size:16px;
}

.content{
    padding:24px;
}

/* =====================================================
CARDS
===================================================== */

.cards{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:20px;
}

.card{
    background:white;
    border-radius:24px;
    padding:24px;
}

.card-title{
    color:#6b7280;
    font-size:14px;
    margin-bottom:10px;
}

.card-value{
    font-size:38px;
    font-weight:800;
}

/* =====================================================
TABLE
===================================================== */

.table-wrap{
    background:white;
    border-radius:24px;
    overflow:auto;
    margin-top:24px;
}

table{
    width:100%;
    border-collapse:collapse;
    min-width:900px;
}

th{
    background:#f8fafc;
    padding:16px;
    text-align:left;
    color:#64748b;
    font-size:13px;
}

td{
    padding:14px 16px;
    border-top:1px solid #edf2f7;
}

.btn{
    border:none;
    border-radius:12px;
    padding:12px 18px;
    font-weight:700;
    cursor:pointer;
}

.btn-blue{
    background:#2563eb;
    color:white;
}

.btn-green{
    background:#16a34a;
    color:white;
}

.btn-red{
    background:#dc2626;
    color:white;
}

.topbar{
    display:flex;
    justify-content:flex-end;
    gap:12px;
    margin-bottom:20px;
}

/* =====================================================
MODAL
===================================================== */

.modal{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.4);
    display:none;
    align-items:center;
    justify-content:center;
    z-index:500;
    padding:20px;
}

.modal-box{
    width:100%;
    max-width:480px;
    background:white;
    border-radius:24px;
    padding:24px;
}

.modal-box h2{
    margin-bottom:20px;
}

.form-group{
    margin-bottom:14px;
}

.form-group input{
    width:100%;
    padding:14px;
    border-radius:12px;
    border:1px solid #dbe2ea;
}

/* =====================================================
NHAP
===================================================== */

.nhap-grid{
    display:grid;
    grid-template-columns:1fr 320px;
    gap:20px;
    margin-top:20px;
}

.total-box{
    background:white;
    border-radius:24px;
    padding:24px;
}

.total-big{
    font-size:38px;
    font-weight:800;
    color:#2563eb;
    margin-top:10px;
}

/* =====================================================
MOBILE
===================================================== */

.mobile-toggle{
    display:none;
}

@media(max-width:900px){

.sidebar{

    width:210px;

    left:-220px;

    padding-top:18px;

    transition:left .25s ease;

}

.sidebar.show{

    left:0;
    box-shadow:
    0 0 0 9999px rgba(0,0,0,.45);

}
.sidebar{

    overflow-y:auto;

}

    .logo{

        font-size:22px;

        padding:0 20px 18px;

    }

    .menu button{

        padding:14px 18px;

        font-size:14px;

    }

    .main{

        margin-left:0;

    }

    .content{

        padding:16px;

    }

    .cards{

        grid-template-columns:1fr;

    }

    .card{

        border-radius:20px;

        padding:20px;

    }

    .card-value{

        font-size:30px;

    }

    .table-wrap{

        border-radius:18px;

    }

    .mobile-toggle{

        display:block;

        border:none;

        background:#2563eb;

        color:white;

        padding:10px 14px;

        border-radius:10px;

    }

    .nhap-grid{

        grid-template-columns:1fr;

    }

    .header{

        flex-direction:column;

        align-items:stretch;

        height:auto;

        padding:16px;

    }

    .header > div{

        width:100%;

        display:flex;

        align-items:center;

        gap:12px;

    }

    .search{

        width:100%;

    }

}
.hidden{
    display:none;
}

</style>
</head>

<body>

<div class="app">

    <!-- SIDEBAR -->

   <aside class="sidebar" id="sidebar">

        <div class="logo">
            POS PRO
        </div>

<div class="menu">

    <button id="btnDashboard">
        Dashboard
    </button>

    <button id="btnProducts" class="active">
        Sản phẩm
    </button>

    <button id="btnNhap">
        Nhập hàng
    </button>

</div>

    </aside>

    <!-- MAIN -->

    <main class="main">

        <div class="header">

            <div style="display:flex;align-items:center;gap:12px;">

                <button class="mobile-toggle"
                onclick="toggleSidebar()">
                    ☰
                </button>

                <div class="page-title"
                id="pageTitle">
                    Dashboard
                </div>

            </div>

            <input
                type="text"
                class="search"
                id="searchInput"
                placeholder="Tìm sản phẩm..."
                oninput="renderProducts()"
            >

        </div>

        <div class="content">

            <!-- DASHBOARD -->

         <div id="dashboardPage" class="hidden">

                <div class="cards">

                    <div class="card">

                        <div class="card-title">
                            Tổng sản phẩm
                        </div>

                        <div class="card-value"
                        id="totalProducts">
                            0
                        </div>

                    </div>

                    <div class="card">

                        <div class="card-title">
                            Tổng tồn kho
                        </div>

                        <div class="card-value"
                        id="totalStock">
                            0
                        </div>

                    </div>

                    <div class="card">

                        <div class="card-title">
                            Tổng giá trị kho
                        </div>

                        <div class="card-value"
                        id="totalValue">
                            0đ
                        </div>

                    </div>

                </div>

            </div>

            <!-- PRODUCTS -->

           <div id="productsPage">

<div class="topbar">

    <button class="btn btn-green"
    onclick="excelFile.click()">
        Import Excel
    </button>
    <button
class="btn btn-blue"
onclick="exportExcel()">

    Xuất Excel

</button>
    <button class="btn btn-blue"
    onclick="openModal()">
        Thêm sản phẩm
    </button>

    <input
        type="file"
        id="excelFile"
        accept=".xlsx,.xls"
        hidden
    >

</div>

                <div class="table-wrap">

                    <table>

                        <thead>

                            <tr>

                                <th>Mã</th>
                                <th>Tên</th>
                                <th>Giá nhập</th>
                                <th>Giá bán</th>
                                <th>Giá sỉ</th>
                                <th>Tồn</th>
                                <th>Sửa</th>
                                <th>Xóa</th>

                            </tr>

                        </thead>

                        <tbody id="productTable"></tbody>

                    </table>

                </div>

            </div>


            <!-- NHAP -->

            <div id="nhapPage" class="hidden">

                <div class="topbar">

                    <button class="btn btn-blue"
                    onclick="addNhapRow()">
                        + Thêm hàng
                    </button>

                </div>

                <div class="table-wrap">

                    <table>

                        <thead>

                            <tr>

                                <th>Mã</th>
                                <th>SL</th>
                                <th>Giá nhập</th>
                                <th>Thành tiền</th>
                                <th>Xóa</th>

                            </tr>

                        </thead>

                        <tbody id="nhapTable"></tbody>

                    </table>

                </div>

                <div class="nhap-grid">

                    <div></div>

                    <div class="total-box">

                        <div>Tổng tiền</div>

                        <div class="total-big"
                        id="tongTien">
                            0đ
                        </div>

                        <br>

                        <button class="btn btn-blue"
                        style="width:100%;"
                        onclick="saveNhap()">
                            Lưu phiếu nhập
                        </button>

                    </div>

                </div>

            </div>

        </div>

    </main>

</div>

<!-- MODAL -->

<div class="modal" id="modal">

    <div class="modal-box">

        <!-- HEADER -->

        <div style="
        display:flex;
        align-items:center;
        justify-content:space-between;
        margin-bottom:20px;
        ">

            <h2 id="modalTitle">
                Sản phẩm
            </h2>

            <button
            onclick="closeModal()"
            style="
                width:36px;
                height:36px;
                border:none;
                border-radius:10px;
                background:#ef4444;
                color:white;
                font-size:18px;
                font-weight:700;
                cursor:pointer;
            ">

                ✕

            </button>

        </div>

        <!-- FORM -->

        <div class="form-group">
            <input
            type="text"
            id="ma"
            placeholder="Mã hàng">
        </div>

        <div class="form-group">
            <input
            type="text"
            id="ten"
            placeholder="Tên hàng">
        </div>

        <div class="form-group">
            <input
            type="number"
            id="giaNhap"
            placeholder="Giá nhập">
        </div>

        <div class="form-group">
            <input
            type="number"
            id="giaBan"
            placeholder="Giá bán">
        </div>

        <div class="form-group">
            <input
            type="number"
            id="giaSi"
            placeholder="Giá sỉ">
        </div>

        <div class="form-group">
            <input
            type="number"
            id="ton"
            placeholder="Tồn kho">
        </div>

        <!-- BUTTON -->

        <button

        style="width:100%;"
        onclick="saveProduct()">

</div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
    getDatabase,
    ref,
    push,
    onValue,
    remove,
    update
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

/* =====================================================
FIREBASE
===================================================== */

const firebaseConfig = {

    apiKey:
    "AIzaSyBdUaWQRCplxX5bG64gBYqLNPGFoRN5DoE",

    authDomain:
    "quanlybanhangtn.firebaseapp.com",

    databaseURL:
    "https://quanlybanhangtn-default-rtdb.asia-southeast1.firebasedatabase.app/",

    projectId:
    "quanlybanhangtn",

    storageBucket:
    "quanlybanhangtn.firebasestorage.app",

    messagingSenderId:
    "627580656858",

    appId:
    "1:627580656858:web:e1cbc69055b78afb0cd9e3"

}

const app = initializeApp(firebaseConfig)

const db = getDatabase(app)

const productsRef = ref(db,"products")

// =====================================================
// SIDEBAR
// =====================================================

const sidebar =
document.getElementById("sidebar")


/* =====================================================
DATA
===================================================== */

let products = []

let nhapRows = []

/* =====================================================
REALTIME
===================================================== */

onValue(productsRef,(snapshot)=>{

    products = []

    snapshot.forEach(child=>{

        products.push({

            id:child.key,

            ...child.val()

        })

    })

    renderProducts()

renderDashboard()

});

/* =====================================================
ĐIỀU HƯỚNG TRANG
===================================================== */

window.showPage = function(page){

    const btnDashboard =
    document.getElementById("btnDashboard")

    const btnProducts =
    document.getElementById("btnProducts")

    const btnNhap =
    document.getElementById("btnNhap")

    const sidebar =
    document.getElementById("sidebar")

    // RESET ACTIVE

    document
    .querySelectorAll(".menu button")
    .forEach(btn=>{

        btn.classList.remove("active")

    })

    // ẨN TOÀN BỘ PAGE

    dashboardPage.classList.add("hidden")

    productsPage.classList.add("hidden")

    nhapPage.classList.add("hidden")

    // =================================================
    // DASHBOARD
    // =================================================

    if(page === "dashboard"){

        btnDashboard.classList.add("active")

        dashboardPage.classList.remove("hidden")

        pageTitle.innerText =
        "Dashboard"

        searchInput.style.display =
        "none"

    }

    // =================================================
    // PRODUCTS
    // =================================================

    else if(page === "products"){

        btnProducts.classList.add("active")

        productsPage.classList.remove("hidden")

        pageTitle.innerText =
        "Sản phẩm"

        searchInput.style.display =
        "block"

    }

    // =================================================
    // NHẬP HÀNG
    // =================================================

else if(page === "nhap"){

    btnNhap.classList.add("active")

    nhapPage.classList.remove("hidden")

    pageTitle.innerText =
    "Nhập hàng"

    searchInput.style.display =
    "none"

    // RENDER NHẬP HÀNG

    renderNhap()

}
    // =================================================
    // MOBILE AUTO CLOSE MENU
    // =================================================

    if(window.innerWidth <= 900){

        // FORCE ĐÓNG MENU

        sidebar.classList.remove("show")

        // FIX CHROME MOBILE CACHE TRANSITION

        sidebar.style.left = "-210px"

        setTimeout(()=>{

            sidebar.style.left = ""

        },10)

    }

}
/* =====================================================
DASHBOARD
===================================================== */

window.renderDashboard = function(){

    totalProducts.innerText =
    products.length

    let stock = 0

    let value = 0

    products.forEach(p=>{

        stock += Number(p.ton)

        value +=
        Number(p.ton) *
        Number(p.gia_nhap)

    })

    totalStock.innerText =
    stock.toLocaleString()

    totalValue.innerText =
    value.toLocaleString() + "đ"

}

/* =====================================================
HIỂN THỊ SẢN PHẨM
===================================================== */

window.renderProducts = function(){

const keyword =
searchInput.value
.toLowerCase()
.trim()

let html = ""

products.forEach((p,index)=>{

    // TÊN + MÃ

    const ten =
    p.ten.toLowerCase()

    const ma =
    p.ma.toLowerCase()

    // TÁCH TỪ KHÓA

    const words =
    keyword.split(" ")

    // SEARCH GẦN ĐÚNG

    const match =
    words.every(w=>

        ten.includes(w)
        ||
        ma.includes(w)

    )

    // HIỂN THỊ

    if(match){
            html += `
            <tr>

                <td>${p.ma}</td>

                <td>${p.ten}</td>

                <td>
                    ${Number(p.gia_nhap).toLocaleString()}
                </td>

                <td>
                    ${Number(p.gia_ban).toLocaleString()}
                </td>

                <td>
                    ${Number(p.gia_si).toLocaleString()}
                </td>

                <td>${p.ton}</td>

<td style="display:flex;gap:8px;">

    <button
    class="btn btn-blue"
    onclick="editProduct(${index})">

        Sửa

    </button>

    <button
    class="btn btn-red"
    onclick="deleteProduct(${index})">

        X

    </button>

</td>

            </tr>
            `

        }

    })

    productTable.innerHTML = html

}
/* =====================================================
XUẤT FILE EXCEL
===================================================== */

window.exportExcel = function(){

    // KHÔNG CÓ DỮ LIỆU

    if(products.length === 0){

        alert("Không có dữ liệu để xuất")

        return

    }

    // TẠO DỮ LIỆU

    const data =
    products.map(p=>({

        "Mã hàng":
        p.ma,

        "Tên hàng":
        p.ten,

        "Giá nhập":
        p.gia_nhap,

        "Giá bán":
        p.gia_ban,

        "Giá sỉ":
        p.gia_si,

        "Tồn kho":
        p.ton

    }))

    // TẠO SHEET

    const worksheet =
    XLSX.utils.json_to_sheet(data)

    // TẠO FILE

    const workbook =
    XLSX.utils.book_new()

    // THÊM SHEET

    XLSX.utils.book_append_sheet(

        workbook,
        worksheet,
        "SanPham"

    )

    // XUẤT FILE

    XLSX.writeFile(

        workbook,

        "POS_PRO_SANPHAM.xlsx"

    )

}

/* =====================================================
MỞ MODAL
===================================================== */

window.openModal = function(){

    // RESET EDIT

    editId = null

    // RESET TITLE

    document
    .querySelector(".modal-box h2")
    .innerText = "Sản phẩm"

    // RESET FORM

    ma.value = ""
    ten.value = ""
    giaNhap.value = ""
    giaBan.value = ""
    giaSi.value = ""
    ton.value = ""

    // HIỆN MODAL

    modal.style.display = "flex"

}

/* =====================================================
EDIT PRODUCT
===================================================== */

let editId = null

window.editProduct = function(index){

    const p = products[index]

    // LƯU ID

    editId = p.id

    // ĐỔ DỮ LIỆU

    ma.value = p.ma

    ten.value = p.ten

    giaNhap.value = p.gia_nhap

    giaBan.value = p.gia_ban

    giaSi.value = p.gia_si

    ton.value = p.ton

    // TITLE

    document
    .querySelector(".modal-box h2")
    .innerText = "Sửa sản phẩm"

    // HIỆN MODAL

    modal.style.display = "flex"

}
/* =====================================================
ĐÓNG MODAL
===================================================== */

window.closeModal = function(){

    // RESET EDIT

    editId = null

    // RESET TITLE

    modalTitle.innerText =
    "Sản phẩm"

    // RESET FORM

    ma.value = ""
    ten.value = ""
    giaNhap.value = ""
    giaBan.value = ""
    giaSi.value = ""
    ton.value = ""

    // ĐÓNG MODAL

    modal.style.display =
    "none"

}
/* =====================================================
THÊM DÒNG NHẬP HÀNG
===================================================== */

window.addNhapRow = function(){

    nhapRows.push({

        ma:"",
        sl:1,
        gia:0

    })

    renderNhap()

}

/* =====================================================
RENDER NHẬP HÀNG
===================================================== */

window.renderNhap = function(){

    let html = ""

    let tong = 0

    nhapRows.forEach((r,index)=>{

        let options = ""

        products.forEach(p=>{

            options += `
            <option
            value="${p.ma}"
            ${r.ma===p.ma ? "selected" : ""}>

                ${p.ma}

            </option>
            `

        })

        const foundProduct =
        products.find(
            p=>p.ma===r.ma
        )

        const tenSP =
        foundProduct
        ? foundProduct.ten
        : ""

        tong += r.sl * r.gia

        html += `
        <tr>

            <td>

                <select
                onchange="changeMa(${index},this.value)"
                style="
                    width:100%;
                    padding:12px;
                    border-radius:12px;
                ">

                    ${options}

                </select>

            </td>

            <td>

                ${tenSP}

            </td>

            <td>

                <input
                type="number"
                value="${r.sl}"
                onchange="changeSl(${index},this.value)"
                style="
                    width:90px;
                    padding:12px;
                ">

            </td>

            <td>

                <input
                type="number"
                value="${r.gia}"
                onchange="changeGia(${index},this.value)"
                style="
                    width:140px;
                    padding:12px;
                ">

            </td>

            <td>

                ${(r.sl*r.gia).toLocaleString()}đ

            </td>

            <td>

                <button
                class="btn btn-red"
                onclick="removeNhap(${index})">

                    Xóa

                </button>

            </td>

        </tr>
        `

    })

    nhapTable.innerHTML = html

    tongTien.innerText =
    tong.toLocaleString() + "đ"

}

/* =====================================================
ĐỔI MÃ
===================================================== */

window.changeMa = function(index,val){

    nhapRows[index].ma = val

    const found =
    products.find(
        p=>p.ma===val
    )

    if(found){

        nhapRows[index].gia =
        found.gia_nhap

    }

    renderNhap()

}

/* =====================================================
ĐỔI SỐ LƯỢNG
===================================================== */

window.changeSl = function(index,val){

    nhapRows[index].sl =
    Number(val)

    renderNhap()

}

/* =====================================================
ĐỔI GIÁ
===================================================== */

window.changeGia = function(index,val){

    nhapRows[index].gia =
    Number(val)

    renderNhap()

}

/* =====================================================
XÓA DÒNG
===================================================== */

window.removeNhap = function(index){

    nhapRows.splice(index,1)

    renderNhap()

}

/* =====================================================
LƯU NHẬP HÀNG
===================================================== */

window.saveNhap = function(){

    nhapRows.forEach(r=>{

        const found =
        products.find(
            p=>p.ma===r.ma
        )

        if(found){

            update(

                ref(
                    db,
                    "products/" + found.id
                ),

                {

                    ton:
                    Number(found.ton) +
                    Number(r.sl),

                    gia_nhap:
                    Number(r.gia)

                }

            )

        }

    })

    nhapRows = []

    renderNhap()

    alert("Đã lưu phiếu nhập")

}
