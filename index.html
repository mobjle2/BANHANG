<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>POS PRO</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Inter',sans-serif;
}

body{
    background:#f4f7fb;
    color:#111827;
}

/* =====================================================
SIDEBAR
===================================================== */

.app{
    display:flex;
    min-height:100vh;
}

.sidebar{
    width:260px;
    background:linear-gradient(to bottom,#0f172a,#111827);
    color:white;
    padding:24px 0;
    position:fixed;
    top:0;
    left:0;
    bottom:0;
    z-index:100;
}

.logo{
    font-size:28px;
    font-weight:800;
    padding:0 28px 30px;
}

.menu button{
    width:100%;
    border:none;
    background:transparent;
    color:white;
    text-align:left;
    padding:20px 28px;
    font-size:15px;
    cursor:pointer;
    transition:.2s;
}

.menu button:hover,
.menu button.active{
    background:#13203a;
}

/* =====================================================
MAIN
===================================================== */

.main{
    flex:1;
    margin-left:260px;
    display:flex;
    flex-direction:column;
}

.header{
    height:80px;
    background:white;
    border-bottom:1px solid #e5e7eb;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 28px;
    position:sticky;
    top:0;
    z-index:50;
}

.page-title{
    font-size:24px;
    font-weight:800;
}

.search{
    width:340px;
    max-width:100%;
    padding:14px;
    border-radius:14px;
    border:1px solid #dbe2ea;
    background:#f9fafb;
    outline:none;
}

.content{
    padding:24px;
}

/* =====================================================
CARDS
===================================================== */

.cards{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:20px;
}

.card{
    background:white;
    border-radius:24px;
    padding:24px;
}

.card-title{
    color:#6b7280;
    font-size:14px;
    margin-bottom:10px;
}

.card-value{
    font-size:38px;
    font-weight:800;
}

/* =====================================================
TABLE
===================================================== */

.table-wrap{
    background:white;
    border-radius:24px;
    overflow:auto;
    margin-top:24px;
}

table{
    width:100%;
    border-collapse:collapse;
    min-width:900px;
}

th{
    background:#f8fafc;
    padding:16px;
    text-align:left;
    color:#64748b;
    font-size:13px;
}

td{
    padding:14px 16px;
    border-top:1px solid #edf2f7;
    font-size:14px;
}

tr:hover{
    background:#f8fafc;
}

.btn{
    border:none;
    border-radius:12px;
    padding:12px 18px;
    font-weight:700;
    cursor:pointer;
}

.btn-blue{
    background:#2563eb;
    color:white;
}

.btn-green{
    background:#16a34a;
    color:white;
}

.btn-red{
    background:#dc2626;
    color:white;
}

.topbar{
    display:flex;
    justify-content:flex-end;
    margin-bottom:20px;
    gap:12px;
}

/* =====================================================
MODAL
===================================================== */

.modal{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.4);
    display:none;
    align-items:center;
    justify-content:center;
    z-index:500;
    padding:20px;
}

.modal-box{
    width:100%;
    max-width:480px;
    background:white;
    border-radius:24px;
    padding:24px;
}

.modal-box h2{
    margin-bottom:20px;
}

.form-group{
    margin-bottom:14px;
}

.form-group input{
    width:100%;
    padding:14px;
    border-radius:12px;
    border:1px solid #dbe2ea;
}

/* =====================================================
NHAP
===================================================== */

.nhap-grid{
    display:grid;
    grid-template-columns:1fr 320px;
    gap:20px;
    margin-top:20px;
}

.total-box{
    background:white;
    border-radius:24px;
    padding:24px;
}

.total-big{
    font-size:38px;
    font-weight:800;
    color:#2563eb;
    margin-top:10px;
}

/* =====================================================
MOBILE
===================================================== */

.mobile-toggle{
    display:none;
}

@media(max-width:900px){

    .sidebar{
        left:-260px;
        transition:.3s;
    }

    .sidebar.show{
        left:0;
    }

    .main{
        margin-left:0;
    }

    .cards{
        grid-template-columns:1fr;
    }

    .header{
        gap:12px;
    }

    .page-title{
        font-size:20px;
    }

    .search{
        width:100%;
    }

    .mobile-toggle{
        display:block;
        border:none;
        background:#2563eb;
        color:white;
        border-radius:10px;
        padding:10px 14px;
        font-weight:700;
    }

    .nhap-grid{
        grid-template-columns:1fr;
    }

}

.hidden{
    display:none;
}

</style>
</head>

<body>

<div class="app">

    <!-- SIDEBAR -->

    <aside class="sidebar" id="sidebar">

        <div class="logo">POS PRO</div>

        <div class="menu">

            <button class="active" onclick="showPage('dashboard',this)">
                Dashboard
            </button>

            <button onclick="showPage('products',this)">
                Sản phẩm
            </button>

            <button onclick="showPage('import',this)">
                Import Excel
            </button>

            <button onclick="showPage('nhap',this)">
                Nhập hàng
            </button>

        </div>

    </aside>

    <!-- MAIN -->

    <main class="main">

        <div class="header">

            <div style="display:flex;align-items:center;gap:12px;">

                <button class="mobile-toggle"
                onclick="toggleSidebar()">
                    ☰
                </button>

                <div class="page-title" id="pageTitle">
                    Dashboard
                </div>

            </div>

            <input
                type="text"
                class="search"
                placeholder="Tìm sản phẩm..."
                id="searchInput"
                oninput="renderProducts()"
            >

        </div>

        <div class="content">

            <!-- DASHBOARD -->

            <div id="dashboardPage">

                <div class="cards">

                    <div class="card">
                        <div class="card-title">
                            Tổng sản phẩm
                        </div>

                        <div class="card-value"
                        id="totalProducts">0</div>
                    </div>

                    <div class="card">
                        <div class="card-title">
                            Tổng tồn kho
                        </div>

                        <div class="card-value"
                        id="totalStock">0</div>
                    </div>

                    <div class="card">
                        <div class="card-title">
                            Tổng giá trị kho
                        </div>

                        <div class="card-value"
                        id="totalValue">0đ</div>
                    </div>

                </div>

            </div>

            <!-- PRODUCTS -->

            <div id="productsPage" class="hidden">

                <div class="topbar">

                    <button class="btn btn-blue"
                    onclick="openModal()">
                        Thêm sản phẩm
                    </button>

                </div>

                <div class="table-wrap">

                    <table>

                        <thead>

                            <tr>
                                <th>Mã</th>
                                <th>Tên</th>
                                <th>Giá nhập</th>
                                <th>Giá bán</th>
                                <th>Giá sỉ</th>
                                <th>Tồn</th>
                                <th>Xóa</th>
                            </tr>

                        </thead>

                        <tbody id="productTable"></tbody>

                    </table>

                </div>

            </div>

            <!-- IMPORT -->

            <div id="importPage" class="hidden">

                <button class="btn btn-green"
                onclick="document.getElementById('excelFile').click()">
                    Import Excel
                </button>

                <input
                    type="file"
                    id="excelFile"
                    accept=".xlsx,.xls"
                    hidden
                >

            </div>

            <!-- NHAP -->

            <div id="nhapPage" class="hidden">

                <div class="topbar">

                    <button class="btn btn-blue"
                    onclick="addNhapRow()">
                        + Thêm hàng
                    </button>

                </div>

                <div class="table-wrap">

                    <table>

                        <thead>

                            <tr>
                                <th>Mã</th>
                                <th>SL</th>
                                <th>Giá nhập</th>
                                <th>Thành tiền</th>
                                <th>Xóa</th>
                            </tr>

                        </thead>

                        <tbody id="nhapTable"></tbody>

                    </table>

                </div>

                <div class="nhap-grid">

                    <div></div>

                    <div class="total-box">

                        <div>Tổng tiền</div>

                        <div class="total-big"
                        id="tongTien">
                            0đ
                        </div>

                        <br>

                        <button class="btn btn-blue"
                        style="width:100%;"
                        onclick="saveNhap()">
                            Lưu phiếu nhập
                        </button>

                    </div>

                </div>

            </div>

        </div>

    </main>

</div>

<!-- MODAL -->

<div class="modal" id="modal">

    <div class="modal-box">

        <h2>Sản phẩm</h2>

        <div class="form-group">
            <input type="text" id="ma" placeholder="Mã hàng">
        </div>

        <div class="form-group">
            <input type="text" id="ten" placeholder="Tên hàng">
        </div>

        <div class="form-group">
            <input type="number" id="giaNhap" placeholder="Giá nhập">
        </div>

        <div class="form-group">
            <input type="number" id="giaBan" placeholder="Giá bán">
        </div>

        <div class="form-group">
            <input type="number" id="giaSi" placeholder="Giá sỉ">
        </div>

        <div class="form-group">
            <input type="number" id="ton" placeholder="Tồn kho">
        </div>

        <button class="btn btn-blue"
        style="width:100%;"
        onclick="saveProduct()">
            Lưu sản phẩm
        </button>

    </div>

</div>

<script>

/* =====================================================
DATA
===================================================== */

let products =
JSON.parse(localStorage.getItem("products") || "[]")

let nhapRows = []

function saveData(){
    localStorage.setItem(
        "products",
        JSON.stringify(products)
    )
}

/* =====================================================
PAGE
===================================================== */

function showPage(page,btn){

    document
    .querySelectorAll(".menu button")
    .forEach(x=>x.classList.remove("active"))

    if(btn) btn.classList.add("active")

    document
    .querySelectorAll(".content > div")
    .forEach(x=>x.classList.add("hidden"))

    if(page==="dashboard"){
        dashboardPage.classList.remove("hidden")
    }

    if(page==="products"){
        productsPage.classList.remove("hidden")
    }

    if(page==="import"){
        importPage.classList.remove("hidden")
    }

    if(page==="nhap"){
        nhapPage.classList.remove("hidden")
    }

    pageTitle.innerText =
    page.charAt(0).toUpperCase() + page.slice(1)

}

/* =====================================================
DASHBOARD
===================================================== */

function renderDashboard(){

    totalProducts.innerText =
    products.length

    let stock = 0
    let value = 0

    products.forEach(p=>{

        stock += Number(p.ton)

        value +=
        Number(p.ton) *
        Number(p.gia_nhap)

    })

    totalStock.innerText =
    stock.toLocaleString()

    totalValue.innerText =
    value.toLocaleString() + "đ"

}

/* =====================================================
PRODUCTS
===================================================== */

function renderProducts(){

    let keyword =
    searchInput.value.toLowerCase()

    let html = ""

    products.forEach((p,index)=>{

        if(
            p.ten.toLowerCase().includes(keyword)
            ||
            p.ma.toLowerCase().includes(keyword)
        ){

            html += `
            <tr>

                <td>${p.ma}</td>

                <td>${p.ten}</td>

                <td>
                    ${Number(p.gia_nhap).toLocaleString()}
                </td>

                <td>
                    ${Number(p.gia_ban).toLocaleString()}
                </td>

                <td>
                    ${Number(p.gia_si).toLocaleString()}
                </td>

                <td>${p.ton}</td>

                <td>
                    <button
                    class="btn btn-red"
                    onclick="deleteProduct(${index})">
                        X
                    </button>
                </td>

            </tr>
            `

        }

    })

    productTable.innerHTML = html

    renderDashboard()

}

/* =====================================================
ADD PRODUCT
===================================================== */

function openModal(){
    modal.style.display="flex"
}

window.onclick = e=>{

    if(e.target===modal){
        modal.style.display="none"
    }

}

function saveProduct(){

    products.push({

        ma:ma.value,
        ten:ten.value,

        gia_nhap:Number(giaNhap.value),

        gia_ban:Number(giaBan.value),

        gia_si:Number(giaSi.value),

        ton:Number(ton.value)

    })

    saveData()

    renderProducts()

    modal.style.display="none"

}

/* =====================================================
DELETE
===================================================== */

function deleteProduct(index){

    if(confirm("Xóa sản phẩm?")){

        products.splice(index,1)

        saveData()

        renderProducts()

    }

}

/* =====================================================
IMPORT EXCEL
===================================================== */

excelFile.addEventListener(
"change",
e=>{

    const file = e.target.files[0]

    const reader = new FileReader()

    reader.onload = evt=>{

        const data =
        new Uint8Array(evt.target.result)

        const workbook =
        XLSX.read(data,{type:'array'})

        const sheet =
        workbook.Sheets[
            workbook.SheetNames[0]
        ]

        const json =
        XLSX.utils.sheet_to_json(sheet)

        json.forEach(row=>{

            products.push({

                ma:row["Mã hàng"] || "",

                ten:row["Tên hàng"] || "",

                gia_nhap:Number(
                    row["Giá vốn"] || 0
                ),

                gia_ban:Number(
                    row["Giá bán"] || 0
                ),

                gia_si:Number(
                    row["Giá bán"] || 0
                ),

                ton:Number(
                    row["Tồn kho"] || 0
                )

            })

        })

        saveData()

        renderProducts()

        alert("Import thành công")

    }

    reader.readAsArrayBuffer(file)

})

/* =====================================================
NHAP
===================================================== */

function addNhapRow(){

    nhapRows.push({
        ma:"",
        sl:1,
        gia:0
    })

    renderNhap()

}

function renderNhap(){

    let html = ""
    let tong = 0

    nhapRows.forEach((r,index)=>{

        let options = ""

        products.forEach(p=>{

            options += `
            <option
            value="${p.ma}"
            ${r.ma===p.ma?"selected":""}>
                ${p.ma}
            </option>
            `

        })

        tong += r.sl * r.gia

        html += `
        <tr>

            <td>
                <select
                onchange="changeMa(${index},this.value)"
                style="
                width:100%;
                padding:12px;
                border-radius:12px;
                ">
                    ${options}
                </select>
            </td>

            <td>
                <input
                type="number"
                value="${r.sl}"
                onchange="changeSl(${index},this.value)"
                style="width:90px;padding:12px;">
            </td>

            <td>
                <input
                type="number"
                value="${r.gia}"
                onchange="changeGia(${index},this.value)"
                style="width:140px;padding:12px;">
            </td>

            <td>
                ${(r.sl*r.gia).toLocaleString()}đ
            </td>

            <td>
                <button
                class="btn btn-red"
                onclick="removeNhap(${index})">
                    X
                </button>
            </td>

        </tr>
        `

    })

    nhapTable.innerHTML = html

    tongTien.innerText =
    tong.toLocaleString() + "đ"

}

function changeMa(index,val){

    nhapRows[index].ma = val

    let found =
    products.find(p=>p.ma===val)

    if(found){
        nhapRows[index].gia =
        found.gia_nhap
    }

    renderNhap()

}

function changeSl(index,val){

    nhapRows[index].sl = Number(val)

    renderNhap()

}

function changeGia(index,val){

    nhapRows[index].gia = Number(val)

    renderNhap()

}

function removeNhap(index){

    nhapRows.splice(index,1)

    renderNhap()

}

function saveNhap(){

    nhapRows.forEach(r=>{

        let found =
        products.find(p=>p.ma===r.ma)

        if(found){

            found.ton += r.sl

            found.gia_nhap = r.gia

        }

    })

    saveData()

    renderProducts()

    nhapRows=[]

    renderNhap()

    alert("Đã lưu phiếu nhập")

}

/* =====================================================
MOBILE
===================================================== */

function toggleSidebar(){
    sidebar.classList.toggle("show")
}

/* =====================================================
INIT
===================================================== */

renderDashboard()
renderProducts()

</script>

</body>
</html>
