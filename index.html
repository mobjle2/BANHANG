<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>POS PRO CLOUD</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Inter',sans-serif;
}

body{
    background:#f4f7fb;
    color:#111827;
}

.app{
    display:flex;
    min-height:100vh;
}

/* =====================================================
SIDEBAR
===================================================== */

.sidebar{
    width:230px;
    background:linear-gradient(to bottom,#0f172a,#111827);
    color:white;
    position:fixed;
    top:0;
    left:0;
    bottom:0;
    z-index:100;
    padding:24px 0;
    transition:left .25s ease;
}

.logo{
    padding:0 28px 30px;
    font-size:28px;
    font-weight:800;
}

.menu button{
    width:100%;
    border:none;
    background:transparent;
    color:white;
    text-align:left;
    padding:16px 22px;
    font-size:14px;
    cursor:pointer;
    border-radius:14px;
    margin:4px 10px;
    width:calc(100% - 20px);
}

.menu button:hover,
.menu button.active{
    background:#13203a;
}

/* =====================================================
MAIN
===================================================== */

.main{
    flex:1;
    margin-left:260px;
}

.header{
    min-height:80px;
    background:white;
    border-bottom:1px solid #e5e7eb;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:16px 24px;
    gap:14px;
    position:sticky;
    top:0;
    z-index:50;
}

.page-title{
    font-size:24px;
    font-weight:800;
}

.search{
    width:320px;
    max-width:100%;
    padding:14px 18px;
    border-radius:16px;
    border:1px solid #dbe2ea;
    background:#f9fafb;
    outline:none;
    font-size:16px;
}

.content{
    padding:24px;
}

/* =====================================================
CARDS
===================================================== */

.cards{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:20px;
}

.card{
    background:white;
    border-radius:24px;
    padding:24px;
}

.card-title{
    color:#6b7280;
    font-size:14px;
    margin-bottom:10px;
}

.card-value{
    font-size:38px;
    font-weight:800;
}

/* =====================================================
TABLE
===================================================== */

.table-wrap{

    background:white;

    border-radius:20px;

    overflow:auto;

    margin-top:20px;

    padding:0;

    border:1px solid #e2e8f0;

}

table{

    width:100%;

    border-collapse:collapse;

    border-spacing:0;

    min-width:900px;

    margin:0;

}

/* HEADER */

th{

    background:#f8fafc;

    padding:12px 14px;

    text-align:left;

    color:#64748b;

    font-size:12px;

    font-weight:700;

    white-space:nowrap;

    border-bottom:1px solid #e2e8f0;

}

/* DATA */

td{

    padding:0;

    border-bottom:1px solid #edf2f7;

    vertical-align:middle;

}

/* ÉP SÁT */

table td:first-child,
table th:first-child{

    padding-left:14px;

}

table td:last-child,
table th:last-child{

    padding-right:14px;

}

/* INPUT TABLE */

/* INPUT TABLE */

table input,
table select{

    border-radius:0 !important;

    box-shadow:none !important;

}

/* NHẬP HÀNG */

table input{

    min-width:0;

}

#nhapTable input{

    background:white;

}

#nhapTable td{

    padding:0 !important;

}

#nhapTable tr{

    height:46px;

}

/* BUTTON */

.btn{

    border:none;

    border-radius:10px;

    padding:10px 16px;

    font-weight:700;

    cursor:pointer;

    transition:.2s;

}

.btn:hover{

    opacity:.92;

}

.btn-blue{

    background:#2563eb;

    color:white;

}

.btn-green{

    background:#16a34a;

    color:white;

}

.btn-red{

    background:#dc2626;

    color:white;

}

/* TOPBAR */

.topbar{

    display:flex;

    justify-content:flex-end;

    gap:10px;

    margin-bottom:16px;

}
/* =====================================================
MODAL
===================================================== */

.modal{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.4);
    display:none;
    align-items:center;
    justify-content:center;
    z-index:500;
    padding:20px;
}

.modal-box{
    width:100%;
    max-width:480px;
    background:white;
    border-radius:24px;
    padding:24px;
}

.modal-box h2{
    margin-bottom:20px;
}

.form-group{
    margin-bottom:14px;
}

.form-group input{
    width:100%;
    padding:14px;
    border-radius:12px;
    border:1px solid #dbe2ea;
}

/* =====================================================
NHAP
===================================================== */

.nhap-grid{
    display:grid;
    grid-template-columns:1fr 320px;
    gap:20px;
    margin-top:20px;
}

.total-box{
    background:white;
    border-radius:24px;
    padding:24px;
}
.total-box{

    position:sticky;
    bottom:20px;

}
.total-big{
    font-size:38px;
    font-weight:800;
    color:#2563eb;
    margin-top:10px;
}

/* =====================================================
MOBILE
===================================================== */

.mobile-toggle{
    display:none;
}

@media(max-width:900px){

.sidebar{

    width:210px;

    left:-220px;

    padding-top:18px;

    transition:left .25s ease;

}

.sidebar.show{

    left:0;
    box-shadow:
    0 0 0 9999px rgba(0,0,0,.45);

}
.sidebar{

    overflow-y:auto;

}

    .logo{

        font-size:22px;

        padding:0 20px 18px;

    }

    .menu button{

        padding:14px 18px;

        font-size:14px;

    }

    .main{

        margin-left:0;

    }

    .content{

        padding:16px;

    }

    .cards{

        grid-template-columns:1fr;

    }

    .card{

        border-radius:20px;

        padding:20px;

    }

    .card-value{

        font-size:30px;

    }

    .table-wrap{

        border-radius:18px;

    }

    .mobile-toggle{

        display:block;

        border:none;

        background:#2563eb;

        color:white;

        padding:10px 14px;

        border-radius:10px;

    }

    .nhap-grid{

        grid-template-columns:1fr;

    }

    .header{

        flex-direction:column;

        align-items:stretch;

        height:auto;

        padding:16px;

    }

    .header > div{

        width:100%;

        display:flex;

        align-items:center;

        gap:12px;

    }

    .search{

        width:100%;

    }

}
.hidden{
    display:none;
}

</style>
</head>

<div class="table-wrap"

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
    getDatabase,
    ref,
    push,
    onValue,
    remove,
    update
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

/* =====================================================
FIREBASE
===================================================== */

const firebaseConfig = {

    apiKey:
    "AIzaSyBdUaWQRCplxX5bG64gBYqLNPGFoRN5DoE",

    authDomain:
    "quanlybanhangtn.firebaseapp.com",

    databaseURL:
    "https://quanlybanhangtn-default-rtdb.asia-southeast1.firebasedatabase.app/",

    projectId:
    "quanlybanhangtn",

    storageBucket:
    "quanlybanhangtn.firebasestorage.app",

    messagingSenderId:
    "627580656858",

    appId:
    "1:627580656858:web:e1cbc69055b78afb0cd9e3"

}

const app = initializeApp(firebaseConfig)

const db = getDatabase(app)

const productsRef = ref(db,"products")

// =====================================================
// SIDEBAR
// =====================================================

const sidebar =
document.getElementById("sidebar")


/* =====================================================
DATA
===================================================== */

let products = []

let nhapRows = []

/* =====================================================
REALTIME
===================================================== */

onValue(productsRef,(snapshot)=>{

    products = []

    snapshot.forEach(child=>{

        products.push({

            id:child.key,

            ...child.val()

        })

    })

    // =================================================
    // RENDER
    // =================================================

    renderProducts()

    renderDashboard()

    renderNhap()

})
/* =====================================================
LOAD NHẬP HÀNG
===================================================== */

if(nhapRows.length === 0){

    addNhapRow()

}
/* =====================================================
ĐIỀU HƯỚNG TRANG
===================================================== */

window.showPage = function(page){

    const btnDashboard =
    document.getElementById("btnDashboard")

    const btnProducts =
    document.getElementById("btnProducts")

    const btnNhap =
    document.getElementById("btnNhap")

    const sidebar =
    document.getElementById("sidebar")

    // RESET ACTIVE

    document
    .querySelectorAll(".menu button")
    .forEach(btn=>{

        btn.classList.remove("active")

    })

    // ẨN TOÀN BỘ PAGE

    dashboardPage.classList.add("hidden")

    productsPage.classList.add("hidden")

    nhapPage.classList.add("hidden")

    // =================================================
    // DASHBOARD
    // =================================================

    if(page === "dashboard"){

        btnDashboard.classList.add("active")

        dashboardPage.classList.remove("hidden")

        pageTitle.innerText =
        "Dashboard"

        searchInput.style.display =
        "none"

    }

    // =================================================
    // PRODUCTS
    // =================================================

    else if(page === "products"){

        btnProducts.classList.add("active")

        productsPage.classList.remove("hidden")

        pageTitle.innerText =
        "Sản phẩm"

        searchInput.style.display =
        "block"

    }

    // =================================================
    // NHẬP HÀNG
    // =================================================

else if(page === "nhap"){

    btnNhap.classList.add("active")

    nhapPage.classList.remove("hidden")

    pageTitle.innerText =
    "Nhập hàng"

    searchInput.style.display =
    "none"

    // RENDER NHẬP HÀNG

    renderNhap()

}
    // =================================================
    // MOBILE AUTO CLOSE MENU
    // =================================================

    if(window.innerWidth <= 900){

        // FORCE ĐÓNG MENU

        sidebar.classList.remove("show")

        // FIX CHROME MOBILE CACHE TRANSITION

        sidebar.style.left = "-210px"

        setTimeout(()=>{

            sidebar.style.left = ""

        },10)

    }

}
/* =====================================================
DASHBOARD
===================================================== */

window.renderDashboard = function(){

    totalProducts.innerText =
    products.length

    let stock = 0

    let value = 0

    products.forEach(p=>{

        stock += Number(p.ton)

        value +=
        Number(p.ton) *
        Number(p.gia_nhap)

    })

    totalStock.innerText =
    stock.toLocaleString()

    totalValue.innerText =
    value.toLocaleString() + "đ"

}

/* =====================================================
HIỂN THỊ SẢN PHẨM
===================================================== */

window.renderProducts = function(){

    // =================================================
    // TỪ KHÓA TÌM KIẾM
    // =================================================

    const keyword =
    searchInput.value
    .toLowerCase()
    .trim()

    let html = ""

    // =================================================
    // DUYỆT SẢN PHẨM
    // =================================================

    products.forEach((p,index)=>{

        // TÊN + MÃ

        const ten =
        (p.ten || "")
        .toLowerCase()

        const ma =
        (p.ma || "")
        .toLowerCase()

        // TÁCH KEYWORD

        const words =
        keyword.split(" ")

        // SEARCH GẦN ĐÚNG

        const match =
        words.every(w=>

            ten.includes(w)
            ||
            ma.includes(w)

        )

// =================================================
// HIỂN THỊ
// =================================================

if(match){

    html += `
    <tr>

        <!-- MÃ -->

        <td style="
        white-space:nowrap;
        font-weight:600;
        ">

            ${p.ma || ""}

        </td>

        <!-- TÊN -->

        <td style="
        min-width:220px;
        font-weight:600;
        color:#0f172a;
        ">

            ${p.ten || ""}

        </td>

        <!-- GIÁ NHẬP -->

        <td style="
        white-space:nowrap;
        ">

            ${(Number(p.gia_nhap) || 0)
            .toLocaleString()}đ

        </td>

        <!-- GIÁ BÁN -->

        <td style="
        white-space:nowrap;
        color:#2563eb;
        font-weight:700;
        ">

            ${(Number(p.gia_ban) || 0)
            .toLocaleString()}đ

        </td>

        <!-- GIÁ SỈ -->

        <td style="
        white-space:nowrap;
        ">

            ${(Number(p.gia_si) || 0)
            .toLocaleString()}đ

        </td>

        <!-- TỒN -->

        <td>

            <div style="
            min-width:54px;
            padding:6px 10px;
            border-radius:10px;
            background:#eff6ff;
            color:#2563eb;
            font-weight:700;
            text-align:center;
            ">

                ${p.ton || 0}

            </div>

        </td>

        <!-- THAO TÁC -->

        <td>

            <div style="
            display:flex;
            align-items:center;
            gap:6px;
            flex-wrap:nowrap;
            ">

                <button
                class="btn btn-blue"
                onclick="editProduct(${index})"
                style="
                    padding:7px 12px;
                    border-radius:8px;
                    font-size:12px;
                    min-width:58px;
                ">

                    Sửa

                </button>

                <button
                class="btn btn-red"
                onclick="deleteProduct(${index})"
                style="
                    padding:7px 12px;
                    border-radius:8px;
                    font-size:12px;
                    min-width:58px;
                ">

                    Xóa

                </button>

            </div>

        </td>

    </tr>
    `

}
    })

    // =================================================
    // KHÔNG CÓ DỮ LIỆU
    // =================================================

    if(html === ""){

        html = `
        <tr>

            <td colspan="7"
            style="
                text-align:center;
                padding:40px;
                color:#94a3b8;
                font-weight:600;
            ">

                Không tìm thấy sản phẩm

            </td>

        </tr>
        `
    }

    // =================================================
    // RENDER TABLE
    // =================================================

    productTable.innerHTML = html

}
/* =====================================================
XUẤT FILE EXCEL
===================================================== */

window.exportExcel = function(){

    // KHÔNG CÓ DỮ LIỆU

    if(products.length === 0){

        alert("Không có dữ liệu để xuất")

        return

    }

    // TẠO DỮ LIỆU

    const data =
    products.map(p=>({

        "Mã hàng":
        p.ma,

        "Tên hàng":
        p.ten,

        "Giá nhập":
        p.gia_nhap,

        "Giá bán":
        p.gia_ban,

        "Giá sỉ":
        p.gia_si,

        "Tồn kho":
        p.ton

    }))

    // TẠO SHEET

    const worksheet =
    XLSX.utils.json_to_sheet(data)

    // TẠO FILE

    const workbook =
    XLSX.utils.book_new()

    // THÊM SHEET

    XLSX.utils.book_append_sheet(

        workbook,
        worksheet,
        "SanPham"

    )

    // XUẤT FILE

    XLSX.writeFile(

        workbook,

        "POS_PRO_SANPHAM.xlsx"

    )

}

/* =====================================================
MỞ MODAL
===================================================== */

window.openModal = function(){

    // RESET EDIT

    editId = null

    // RESET TITLE

    document
    .querySelector(".modal-box h2")
    .innerText = "Sản phẩm"

    // RESET FORM

    ma.value = ""
    ten.value = ""
    giaNhap.value = ""
    giaBan.value = ""
    giaSi.value = ""
    ton.value = ""

    // HIỆN MODAL

    modal.style.display = "flex"

}

/* =====================================================
EDIT PRODUCT
===================================================== */

let editId = null

window.editProduct = function(index){

    const p = products[index]

    // LƯU ID

    editId = p.id

    // ĐỔ DỮ LIỆU

    ma.value = p.ma

    ten.value = p.ten

    giaNhap.value = p.gia_nhap

    giaBan.value = p.gia_ban

    giaSi.value = p.gia_si

    ton.value = p.ton

    // TITLE

    document
    .querySelector(".modal-box h2")
    .innerText = "Sửa sản phẩm"

    // HIỆN MODAL

    modal.style.display = "flex"

}

/* =====================================================
ĐÓNG MODAL
===================================================== */

window.closeModal = function(){

    // RESET EDIT

    editId = null

    // RESET TITLE

    modalTitle.innerText =
    "Sản phẩm"

    // RESET FORM

    ma.value = ""
    ten.value = ""
    giaNhap.value = ""
    giaBan.value = ""
    giaSi.value = ""
    ton.value = ""

    // ĐÓNG MODAL

    modal.style.display =
    "none"

}
/* =====================================================
SAVE PRODUCT
===================================================== */

window.saveProduct = function(){

    // DATA

    const data = {

        ma:ma.value,

        ten:ten.value,

        gia_nhap:Number(giaNhap.value),

        gia_ban:Number(giaBan.value),

        gia_si:Number(giaSi.value),

        ton:Number(ton.value)

    }

    // =================================================
    // SỬA
    // =================================================

    if(editId){

        update(

            ref(
                db,
                "products/" + editId
            ),

            data

        )

    }

    // =================================================
    // THÊM
    // =================================================

    else{

        push(
            productsRef,
            data
        )

    }

    // =================================================
    // ĐÓNG MODAL
    // =================================================

    closeModal()

}
/* =====================================================
XÓA SẢN PHẨM
===================================================== */

window.deleteProduct = function(index){

    if(confirm("Xóa sản phẩm?")){

        remove(

            ref(
                db,
                "products/" + products[index].id
            )

        )

    }

}
/* =====================================================
RENDER NHẬP HÀNG
===================================================== */

        products.find(
            p=>p.ma===r.ma
        )

        // TÊN

        const tenSP =
        foundProduct
        ? foundProduct.ten
        : (r.ten || "")

        // TỔNG

        tong += r.sl * r.gia

        // =================================================
        // ROW
        // =================================================

        html += `
        <tr style="
        background:white;
        border-bottom:1px solid #e2e8f0;
        height:46px;
        ">

            <!-- MÃ -->

            <td style="
            padding:0;
            width:140px;
            min-width:140px;
            ">

                <input
                type="text"
                value="${r.ma}"
                onchange="changeMa(${index},this.value)"
                placeholder="Mã hàng"
                style="
                    width:100%;
                    height:46px;
                    border:none;
                    border-right:1px solid #e2e8f0;
                    padding:0 12px;
                    font-size:13px;
                    outline:none;
                    background:white;
                    box-sizing:border-box;
                ">

            </td>

            <!-- TÊN -->

            <td style="
            padding:0;
            min-width:260px;
            ">

                <input
                type="text"
                value="${tenSP}"
                onchange="changeTen(${index},this.value)"
                placeholder="Tên sản phẩm"
                style="
                    width:100%;
                    height:46px;
                    border:none;
                    border-right:1px solid #e2e8f0;
                    padding:0 12px;
                    font-size:13px;
                    outline:none;
                    background:white;
                    box-sizing:border-box;
                ">

            </td>

            <!-- SL -->

            <td style="
            padding:0;
            width:70px;
            min-width:70px;
            ">

                <input
                type="number"
                value="${r.sl}"
                onchange="changeSl(${index},this.value)"
                style="
                    width:100%;
                    height:46px;
                    border:none;
                    border-right:1px solid #e2e8f0;
                    padding:0 10px;
                    text-align:center;
                    font-size:13px;
                    outline:none;
                    box-sizing:border-box;
                ">

            </td>

            <!-- GIÁ NHẬP -->

            <td style="
            padding:0;
            width:120px;
            min-width:120px;
            ">

                <input
                type="number"
                value="${r.gia}"
                onchange="changeGia(${index},this.value)"
                style="
                    width:100%;
                    height:46px;
                    border:none;
                    border-right:1px solid #e2e8f0;
                    padding:0 12px;
                    font-size:13px;
                    outline:none;
                    box-sizing:border-box;
                ">

            </td>

            <!-- GIÁ BÁN -->

            <td style="
            padding:0;
            width:120px;
            min-width:120px;
            ">

                <input
                type="number"
                value="${r.giaBan || 0}"
                onchange="changeGiaBan(${index},this.value)"
                style="
                    width:100%;
                    height:46px;
                    border:none;
                    border-right:1px solid #e2e8f0;
                    padding:0 12px;
                    font-size:13px;
                    outline:none;
                    background:#f8fafc;
                    box-sizing:border-box;
                ">

            </td>

            <!-- THÀNH TIỀN -->

            <td style="
            padding:0;
            width:140px;
            min-width:140px;
            ">

                <div style="
                width:100%;
                height:46px;
                display:flex;
                align-items:center;
                justify-content:center;
                background:#f8fafc;
                color:#2563eb;
                font-weight:700;
                font-size:13px;
                border-right:1px solid #e2e8f0;
                box-sizing:border-box;
                ">

                    ${(r.sl*r.gia).toLocaleString()}đ

                </div>

            </td>

            <!-- XÓA -->

            <td style="
            padding:0;
            width:70px;
            min-width:70px;
            max-width:70px;
            ">

                <button
                class="btn btn-red"
                onclick="removeNhap(${index})"
                style="
                    width:100%;
                    height:46px;
                    border:none;
                    border-radius:0;
                    font-size:12px;
                    display:block;
                ">

                    Xóa

                </button>

            </td>

        </tr>
        `

    })

    nhapTable.innerHTML = html

    tongTien.innerText =
    tong.toLocaleString() + "đ"

}
/* =====================================================
ĐỔI MÃ
===================================================== */

window.changeMa = function(index,val){

    nhapRows[index].ma = val

    const found =
    products.find(
        p=>p.ma===val
    )

    if(found){

        nhapRows[index].ten =
        found.ten

        nhapRows[index].gia =
        found.gia_nhap

        nhapRows[index].giaBan =
        found.gia_ban

    }

    renderNhap()

}

/* =====================================================
ĐỔI TÊN
===================================================== */

window.changeTen = function(index,val){

    nhapRows[index].ten = val

    renderNhap()

}
/* =====================================================
ĐỔI SỐ LƯỢNG
===================================================== */

window.changeSl = function(index,val){

    nhapRows[index].sl =
    Number(val)

    renderNhap()

}

/* =====================================================
ĐỔI GIÁ NHẬP
===================================================== */

window.changeGia = function(index,val){

    nhapRows[index].gia =
    Number(val)

    renderNhap()

}

/* =====================================================
ĐỔI GIÁ BÁN
===================================================== */

window.changeGiaBan = function(index,val){

    nhapRows[index].giaBan =
    Number(val)

}

/* =====================================================
XÓA DÒNG
===================================================== */

window.removeNhap = function(index){

    nhapRows.splice(index,1)

    renderNhap()

}

/* =====================================================
LƯU NHẬP HÀNG
===================================================== */

window.saveNhap = function(){

    nhapRows.forEach(r=>{

        const found =
        products.find(
            p=>p.ma===r.ma
        )

        if(found){

            update(

                ref(
                    db,
                    "products/" + found.id
                ),

                {

                    ton:
                    Number(found.ton) +
                    Number(r.sl),

                    gia_nhap:
                    Number(r.gia),

                    gia_ban:
                    Number(r.giaBan)

                }

            )

        }

    })

    nhapRows = []

    renderNhap()

    alert("Đã lưu phiếu nhập")

}
