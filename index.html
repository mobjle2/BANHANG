<script type="module">

/* =====================================================
FIREBASE IMPORT
===================================================== */

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
    getDatabase,
    ref,
    push,
    onValue,
    remove,
    update
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

/* =====================================================
FIREBASE CONFIG
===================================================== */

const firebaseConfig = {

    apiKey:
    "AIzaSyBdUaWQRCplxX5bG64gBYqLNPGFoRN5DoE",

    authDomain:
    "quanlybanhangtn.firebaseapp.com",

    databaseURL:
    "https://quanlybanhangtn-default-rtdb.asia-southeast1.firebasedatabase.app/",

    projectId:
    "quanlybanhangtn",

    storageBucket:
    "quanlybanhangtn.firebasestorage.app",

    messagingSenderId:
    "627580656858",

    appId:
    "1:627580656858:web:e1cbc69055b78afb0cd9e3"

}

/* =====================================================
INIT
===================================================== */

const app = initializeApp(firebaseConfig)

const db = getDatabase(app)

const productsRef = ref(db,"products")

/* =====================================================
DATA
===================================================== */

let products = []

let nhapRows = []

/* =====================================================
REALTIME SYNC
===================================================== */

onValue(productsRef,(snapshot)=>{

    products = []

    snapshot.forEach(child=>{

        products.push({

            id:child.key,

            ...child.val()

        })

    })

    renderProducts()

    renderDashboard()

})

/* =====================================================
PAGE
===================================================== */

window.showPage = function(page,btn){

    document
    .querySelectorAll(".menu button")
    .forEach(x=>x.classList.remove("active"))

    if(btn){
        btn.classList.add("active")
    }

    document
    .querySelectorAll(".content > div")
    .forEach(x=>x.classList.add("hidden"))

    if(page==="dashboard"){
        dashboardPage.classList.remove("hidden")
    }

    if(page==="products"){
        productsPage.classList.remove("hidden")
    }

    if(page==="import"){
        importPage.classList.remove("hidden")
    }

    if(page==="nhap"){
        nhapPage.classList.remove("hidden")
    }

    pageTitle.innerText =
    page.charAt(0).toUpperCase() + page.slice(1)

}

/* =====================================================
DASHBOARD
===================================================== */

window.renderDashboard = function(){

    totalProducts.innerText =
    products.length

    let stock = 0

    let value = 0

    products.forEach(p=>{

        stock += Number(p.ton)

        value +=
        Number(p.ton) *
        Number(p.gia_nhap)

    })

    totalStock.innerText =
    stock.toLocaleString()

    totalValue.innerText =
    value.toLocaleString() + "đ"

}

/* =====================================================
PRODUCTS
===================================================== */

window.renderProducts = function(){

    const keyword =
    searchInput.value.toLowerCase()

    let html = ""

    products.forEach((p,index)=>{

        if(

            p.ten.toLowerCase().includes(keyword)

            ||

            p.ma.toLowerCase().includes(keyword)

        ){

            html += `
            <tr>

                <td>${p.ma}</td>

                <td>${p.ten}</td>

                <td>
                    ${Number(p.gia_nhap).toLocaleString()}
                </td>

                <td>
                    ${Number(p.gia_ban).toLocaleString()}
                </td>

                <td>
                    ${Number(p.gia_si).toLocaleString()}
                </td>

                <td>${p.ton}</td>

                <td>

                    <button
                    class="btn btn-red"
                    onclick="deleteProduct(${index})">

                        X

                    </button>

                </td>

            </tr>
            `

        }

    })

    productTable.innerHTML = html

}

/* =====================================================
MODAL
===================================================== */

window.openModal = function(){

    modal.style.display = "flex"

}

window.onclick = function(e){

    if(e.target === modal){

        modal.style.display = "none"

    }

}

/* =====================================================
SAVE PRODUCT
===================================================== */

window.saveProduct = function(){

    push(productsRef,{

        ma:ma.value,

        ten:ten.value,

        gia_nhap:Number(giaNhap.value),

        gia_ban:Number(giaBan.value),

        gia_si:Number(giaSi.value),

        ton:Number(ton.value)

    })

    modal.style.display = "none"

    ma.value = ""
    ten.value = ""
    giaNhap.value = ""
    giaBan.value = ""
    giaSi.value = ""
    ton.value = ""

}

/* =====================================================
DELETE PRODUCT
===================================================== */

window.deleteProduct = function(index){

    if(confirm("Xóa sản phẩm?")){

        remove(

            ref(
                db,
                "products/" + products[index].id
            )

        )

    }

}

/* =====================================================
IMPORT EXCEL
===================================================== */

excelFile.addEventListener(
"change",
e=>{

    const file = e.target.files[0]

    if(!file) return

    const reader = new FileReader()

    reader.onload = evt=>{

        const data =
        new Uint8Array(evt.target.result)

        const workbook =
        XLSX.read(data,{type:"array"})

        const sheet =
        workbook.Sheets[
            workbook.SheetNames[0]
        ]

        const json =
        XLSX.utils.sheet_to_json(sheet)

        json.forEach(row=>{

            push(productsRef,{

                ma:
                row["Mã hàng"] || "",

                ten:
                row["Tên hàng"] || "",

                gia_nhap:Number(
                    row["Giá vốn"] || 0
                ),

                gia_ban:Number(
                    row["Giá bán"] || 0
                ),

                gia_si:Number(
                    row["Giá bán"] || 0
                ),

                ton:Number(
                    row["Tồn kho"] || 0
                )

            })

        })

        alert("Import thành công")

    }

    reader.readAsArrayBuffer(file)

})

/* =====================================================
NHAP
===================================================== */

window.addNhapRow = function(){

    nhapRows.push({

        ma:"",
        sl:1,
        gia:0

    })

    renderNhap()

}

/* =====================================================
RENDER NHAP
===================================================== */

window.renderNhap = function(){

    let html = ""

    let tong = 0

    nhapRows.forEach((r,index)=>{

        let options = ""

        products.forEach(p=>{

            options += `
            <option
            value="${p.ma}"
            ${r.ma===p.ma ? "selected" : ""}>

                ${p.ma}

            </option>
            `

        })

        tong += r.sl * r.gia

        html += `
        <tr>

            <td>

                <select
                onchange="changeMa(${index},this.value)"
                style="
                    width:100%;
                    padding:12px;
                    border-radius:12px;
                ">

                    ${options}

                </select>

            </td>

            <td>

                <input
                type="number"
                value="${r.sl}"
                onchange="changeSl(${index},this.value)"
                style="
                    width:90px;
                    padding:12px;
                ">

            </td>

            <td>

                <input
                type="number"
                value="${r.gia}"
                onchange="changeGia(${index},this.value)"
                style="
                    width:140px;
                    padding:12px;
                ">

            </td>

            <td>

                ${(r.sl*r.gia).toLocaleString()}đ

            </td>

            <td>

                <button
                class="btn btn-red"
                onclick="removeNhap(${index})">

                    X

                </button>

            </td>

        </tr>
        `

    })

    nhapTable.innerHTML = html

    tongTien.innerText =
    tong.toLocaleString() + "đ"

}

/* =====================================================
NHAP ACTION
===================================================== */

window.changeMa = function(index,val){

    nhapRows[index].ma = val

    const found =
    products.find(
        p=>p.ma===val
    )

    if(found){

        nhapRows[index].gia =
        found.gia_nhap

    }

    renderNhap()

}

window.changeSl = function(index,val){

    nhapRows[index].sl =
    Number(val)

    renderNhap()

}

window.changeGia = function(index,val){

    nhapRows[index].gia =
    Number(val)

    renderNhap()

}

window.removeNhap = function(index){

    nhapRows.splice(index,1)

    renderNhap()

}

/* =====================================================
SAVE NHAP
===================================================== */

window.saveNhap = function(){

    nhapRows.forEach(r=>{

        const found =
        products.find(
            p=>p.ma===r.ma
        )

        if(found){

            update(

                ref(
                    db,
                    "products/" + found.id
                ),

                {

                    ton:
                    Number(found.ton) +
                    Number(r.sl),

                    gia_nhap:
                    Number(r.gia)

                }

            )

        }

    })

    nhapRows = []

    renderNhap()

    alert("Đã lưu phiếu nhập")

}

/* =====================================================
MOBILE
===================================================== */

window.toggleSidebar = function(){

    sidebar.classList.toggle("show")

}

/* =====================================================
INIT
===================================================== */

renderDashboard()

renderProducts()

</script>
